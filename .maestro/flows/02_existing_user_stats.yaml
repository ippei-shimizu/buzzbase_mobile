# ゴールデンパス: 既存ユーザー（v1 データのみ）でログイン → 成績画面が崩れず表示される。
# 守るリスク: v2 リファクタが既存ユーザーの集計画面を壊す後方互換リグレッション。
appId: jp.buzzbase.mobile
---
- runFlow: _login.yaml
- tapOn: "成績"
# 成績画面が描画され、クラッシュしないことを確認する。
- assertVisible: "成績"
# TODO(CI iteration): 実機/シミュレータで描画される打撃サブタブの見出しを確認し、
#   集計値カードが表示されることまでアサートを強める（例: 打率カードのラベル）。
