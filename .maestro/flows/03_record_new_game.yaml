# ゴールデンパス: 新仕様の試合記録フローに入り、試合情報フォームが表示される。
# 守るリスク: 新仕様の主導線（記録ボタン → 試合情報入力）の結合崩れ。
appId: jp.buzzbase.mobile
---
- runFlow: _login.yaml
- tapOn: "試合結果を記録する"
# 試合情報フォーム（step1）が表示されることを確認する。
- assertVisible: "球場"
- assertVisible: "自チーム"
- assertVisible: "相手チーム"
# TODO(CI iteration): 以下の深い導線をシミュレータで selector を確認しながら段階追加する。
#   1. チーム/球場/点数を入力し記録パターン（両方/打撃のみ/投球のみ）を選ぶ
#   2. 打席記録ウィザード（グラウンドタップ → 打席結果 → 得点）を完走する
#   3. 試合結果サマリーで入力した打席が表示される
#   グラウンドタップ等は座標/testID が必要なため、対象要素に testID 付与を検討する。
