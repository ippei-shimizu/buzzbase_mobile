name: Maestro E2E

# E2E は iOS Simulator のビルド・起動で重いため、リリース系 PR と手動実行に絞る。
# flows が安定 green になるまでは workflow_dispatch 中心で運用し、安定後に pull_request を有効化する。
on:
  workflow_dispatch:
  pull_request:
    branches:
      - "release/**"

# 前提（Repository secrets / variables）:
#   MAESTRO_EMAIL / MAESTRO_PASSWORD : シード済みテストユーザーの認証情報
#   EXPO_PUBLIC_API_URL              : テスト対象バックエンド（v1 データを seed したステージング等）
jobs:
  e2e:
    name: Golden path E2E (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # expo run:ios は Release で実機向け（署名必須）ビルドに倒れるため、
      # prebuild → iphonesimulator SDK + 署名無効で xcodebuild し、シミュレータに install する。
      - name: Expo prebuild (iOS native project + CocoaPods)
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform ios

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16" || xcrun simctl boot "iPhone 15" || true
          xcrun simctl list devices booted

      - name: Build app for simulator (no code signing)
        run: |
          xcodebuild \
            -workspace ios/BUZZBASE.xcworkspace \
            -scheme BUZZBASE \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Install app on simulator
        run: |
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -maxdepth 1 -name '*.app' | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      # まずは認証不要の疎通フロー(01)で build + Maestro 基盤を green にする。
      # ログインを伴う 02/03 は MAESTRO_EMAIL/PASSWORD（シード済みユーザー）と稼働バックエンドが
      # 必要なため、secrets 整備後に対象を .maestro/ 全体へ広げる。
      - name: Run Maestro smoke flow
        env:
          MAESTRO_EMAIL: ${{ secrets.MAESTRO_EMAIL }}
          MAESTRO_PASSWORD: ${{ secrets.MAESTRO_PASSWORD }}
        run: maestro test .maestro/flows/01_smoke_launch.yaml

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-output
          path: ~/.maestro/tests
          retention-days: 7
